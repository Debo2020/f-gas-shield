name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  vitest:
    name: Vitest (frontend smoke tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest
        run: bun run test

  edge-functions:
    name: Deno (Supabase edge function tests)
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      # Pin Deno's cache dir so actions/cache and `deno cache` agree on location.
      # DENO_DIR holds remote module downloads, transpiled JS, type-check info,
      # and the V8 compilation cache — caching it skips re-download + re-compile.
      DENO_DIR: ${{ github.workspace }}/.deno_cache
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno modules + compiled outputs
        uses: actions/cache@v4
        with:
          path: ${{ env.DENO_DIR }}
          # Invalidate when any edge function source or test changes (affects
          # transpiled/type-check artifacts). Remote module downloads still
          # restore via the prefix fallback below.
          key: ${{ runner.os }}-deno-v2-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-deno-v2-

      - name: Warm Deno cache (download + transpile dependencies)
        run: deno cache supabase/functions/**/*.test.ts




      - name: Verify required secrets are present
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error::Missing repository secrets VITE_SUPABASE_URL and/or VITE_SUPABASE_PUBLISHABLE_KEY"
            echo "Add them in Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Write .env for Deno dotenv loader
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY"
          } > .env

      - name: Run edge function tests
        run: |
          deno test \
            --allow-net \
            --allow-env \
            --allow-read \
            supabase/functions/**/*.test.ts
